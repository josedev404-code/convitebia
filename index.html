<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥰 Convite Especial 🥰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Segoe UI', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: linear-gradient(to bottom, #fff5e6, #ffe6f0);
            border-radius: 30px;
            padding: 40px 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            text-align: center;
            border: 5px dashed #ffb3d9;
            animation: bounce 3s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .emojis {
            font-size: 50px;
            margin-bottom: 20px;
            letter-spacing: 10px;
        }

        h1 {
            color: #d63384;
            font-size: 32px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(255, 179, 217, 0.5);
        }

        .message {
            font-size: 18px;
            color: #764ba2;
            margin-bottom: 30px;
            line-height: 1.6;
            font-weight: bold;
        }

        .buttons-section {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .buttons-section.hidden {
            display: none;
            opacity: 0;
            visibility: hidden;
        }

        button {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Comic Sans MS', cursive;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-sim {
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
            color: white;
            position: static !important;
        }

        .btn-sim:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(255, 107, 157, 0.4);
        }

        .btn-sim:active:not(:disabled) {
            transform: scale(0.95);
        }

        .btn-nao {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
            position: relative;
            pointer-events: auto;
            transition: all 0.1s ease-out;
        }

        .btn-nao.fugindo {
            position: fixed !important;
        }

        .btn-nao:hover:not(:disabled) {
            box-shadow: 0 10px 25px rgba(78, 205, 196, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .date-section {
            display: none;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 3px dashed #ffb3d9;
        }

        .date-section.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .date-section h2 {
            color: #d63384;
            margin-bottom: 20px;
            font-size: 24px;
        }

        input[type="date"] {
            padding: 15px 20px;
            font-size: 16px;
            border: 3px solid #ffb3d9;
            border-radius: 15px;
            font-family: 'Comic Sans MS', cursive;
            background: white;
            color: #764ba2;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
        }

        input[type="date"]:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(214, 51, 132, 0.3);
        }

        .confirm-btn {
            background: linear-gradient(135deg, #ffd89b, #ffa751);
            color: white;
            padding: 12px 30px;
            font-size: 16px;
        }

        .confirm-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 167, 81, 0.4);
        }

        .resultado {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            border: 3px solid #ffb3d9;
        }

        .resultado.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        .resultado p {
            font-size: 20px;
            color: #764ba2;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .resultado .data-escolhida {
            font-size: 24px;
            color: #d63384;
            text-decoration: underline;
        }

        .heart {
            display: inline-block;
            animation: heartBeat 1.3s infinite;
        }

        @keyframes heartBeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.3);
            }
            50% {
                transform: scale(1);
            }
        }

        .stars {
            font-size: 30px;
            margin-top: 20px;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emojis">
            🍷
        </div>
        
        <h1>Vamos tomar o vinho?</h1>

        <div class="buttons-section">
            <button class="btn-sim" onclick="mostrarData()">Sim! 😍</button>
            <button class="btn-nao" onclick="rejeitarConvite()">Não 😢</button>
        </div>

        <div class="date-section" id="dateSection">
            <h2>Que bom gatinha, que dia seria?📅</h2>
            <input type="date" id="dataEscolhida">
            <br>
            <button class="confirm-btn" onclick="confirmarData()">Confirmar Data ✨</button>
        </div>

        <div class="resultado" id="resultado">
            <p>Eba! Combinamos para:</p>
            <p class="data-escolhida" id="dataConfirmada"></p>
            <p>Estou ansioso demais! 🥰</p>
            <div class="stars">✨ 🌟 ✨</div>
        </div>
    </div>

    <script>
        let dataConfirmada = false;

        function mostrarData() {
            if (!dataConfirmada) {
                document.getElementById('dateSection').classList.add('show');
                document.querySelector('.buttons-section').classList.add('hidden');
                // Desabilita ambos os botões
                document.querySelectorAll('button').forEach(btn => {
                    if (btn !== document.querySelector('.confirm-btn')) {
                        btn.disabled = true;
                    }
                });
            }
        }

        function confirmarData() {
            const data = document.getElementById('dataEscolhida').value;
            
            if (!data) {
                alert('Por favor, escolha uma data! 📅');
                return;
            }

            // Formatar a data
            const dataObj = new Date(data);
            const diasSemana = ['domingo', 'segunda', 'terça', 'quarta', 'quinta', 'sexta', 'sábado'];
            const meses = ['janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho', 'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'];
            
            const dia = dataObj.getDate();
            const mes = meses[dataObj.getMonth()];
            const ano = dataObj.getFullYear();
            const diaSemana = diasSemana[dataObj.getDay()];

            const dataFormatada = `${diaSemana}, ${dia} de ${mes} de ${ano}`;

            document.getElementById('dataConfirmada').textContent = dataFormatada;
            document.getElementById('resultado').classList.add('show');
            document.getElementById('dateSection').classList.remove('show');

            // Desabilita todos os botões permanentemente
            document.querySelectorAll('button').forEach(btn => {
                btn.disabled = true;
            });

            dataConfirmada = true;
        }

        function moverBotaoNao() {
            const botaoNao = document.querySelector('.btn-nao');
            
            // Adicionar classe para mudar para fixed positioning
            botaoNao.classList.add('fugindo');
            
            // Gerar posição aleatória
            const posX = Math.random() * (window.innerWidth - botaoNao.offsetWidth);
            const posY = Math.random() * (window.innerHeight - botaoNao.offsetHeight);
            
            botaoNao.style.left = posX + 'px';
            botaoNao.style.top = posY + 'px';
        }

        function voltarBotaoNao() {
            const botaoNao = document.querySelector('.btn-nao');
            botaoNao.classList.remove('fugindo');
            botaoNao.style.left = '';
            botaoNao.style.top = '';
        }

        function rejeitarConvite() {
            alert('Tudo bem... 😢 Talvez numa próxima oportunidade! 💔');
        }

        // Impedir que a data seja menor que hoje
        document.getElementById('dataEscolhida').addEventListener('change', function() {
            const hoje = new Date().toISOString().split('T')[0];
            if (this.value < hoje) {
                alert('Por favor, escolha uma data no futuro! 📅');
                this.value = '';
            }
        });

        // Definir data mínima como hoje
        window.addEventListener('load', function() {
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('dataEscolhida').min = hoje;

            // Adicionar event listener ao botão "não"
            const botaoNao = document.querySelector('.btn-nao');
            let timerId = null;
            
            // Quando o mouse entra no botão, ele foge
            botaoNao.addEventListener('mouseenter', function(e) {
                if (!this.disabled) {
                    moverBotaoNao();
                }
            });

            // Quando o mouse sai do botão, retorna à posição original
            botaoNao.addEventListener('mouseleave', function(e) {
                if (!this.disabled) {
                    // Pequeno delay para dar tempo de ver a animação
                    setTimeout(() => {
                        voltarBotaoNao();
                    }, 100);
                }
            });

            // Também detectar quando o mouse se aproxima muito do botão
            document.addEventListener('mousemove', function(e) {
                if (botaoNao.disabled) return;
                
                const rect = botaoNao.getBoundingClientRect();
                const distancia = Math.sqrt(
                    Math.pow(e.clientX - (rect.left + rect.width / 2), 2) +
                    Math.pow(e.clientY - (rect.top + rect.height / 2), 2)
                );
                
                // Se o mouse estiver a menos de 100px do botão, ele foge
                if (distancia < 100) {
                    moverBotaoNao();
                }
            });
        });
    </script>
</body>
</html>
