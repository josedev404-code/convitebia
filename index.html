<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite bia.teste</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="emojis">
            🍷
        </div>
        
        <h1>Vamos dar um role sabado?</h1>

        <div class="buttons-section">
            <button class="btn-sim" onclick="mostrarData()">Sim! 😍</button>
            <button class="btn-nao" onclick="rejeitarConvite()">Não 😢</button>
        </div>

        <div class="date-section" id="dateSection">
            <h2>Que bom, que horário seria?⏰</h2>
            <input type="time" id="dataEscolhida">
            <br>
            <button class="confirm-btn" onclick="confirmarData()">Confirmar Horário ✨</button>
        </div>

        <div class="resultado" id="resultado">
            <p>Eba! Combinamos para:</p>
            <p class="data-escolhida" id="dataConfirmada"></p>
            <p>Estou ansioso demais! 🥰</p>
            <div class="stars">✨ 🌟 ✨</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
